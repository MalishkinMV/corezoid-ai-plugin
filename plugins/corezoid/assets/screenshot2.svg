<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="0.55" stop-color="#EAF8F6"/>
      <stop offset="1" stop-color="#FFF7E0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#010F5C" flood-opacity="0.14"/>
    </filter>
    <style>
      .eyebrow { font: 700 24px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; letter-spacing: 4px; fill: #0B6E69; }
      .title { font: 800 70px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #010F5C; }
      .subtitle { font: 500 31px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #24324B; }
      .bullet { font: 600 30px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #010F5C; }
      .label { font: 700 20px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #69758A; letter-spacing: 2px; }
      .pill { font: 700 24px 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: white; }
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="200" fill="#00B6A7" opacity="0.10"/>
  <circle cx="1020" cy="610" r="250" fill="#F7B731" opacity="0.16"/>
  <rect x="62" y="64" width="1076" height="592" rx="42" fill="white" filter="url(#shadow)"/>
  <text x="96" y="126" class="eyebrow">COREZOID</text>
  <text x="96" y="205" class="title">API Orchestration</text>
  <text x="98" y="258" class="subtitle">Turn processes into APIs, wrappers, webhooks, and integrations.</text>
  <g transform="translate(0,80)">
    <circle cx="120" cy="243" r="7" fill="#F2A900"/><text x="145" y="250" class="bullet">API Gateway and OpenAPI guidance</text><circle cx="120" cy="301" r="7" fill="#F2A900"/><text x="145" y="308" class="bullet">Templates, playbooks, and samples</text><circle cx="120" cy="359" r="7" fill="#F2A900"/><text x="145" y="366" class="bullet">MCP reference server bundled safely</text>
  </g>
  <rect x="790" y="188" width="250" height="250" rx="52" fill="#010F5C"/>
  <path d="M835 315 C835 270, 872 235, 918 235 C958 235, 991 263, 1000 300" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M997 392 C986 416, 958 435, 918 435 C872 435, 835 400, 835 355" fill="none" stroke="#F2A900" stroke-width="24" stroke-linecap="round"/>
  <circle cx="918" cy="335" r="31" fill="white"/>
  <rect x="812" y="500" width="305" height="58" rx="29" fill="#F2A900"/>
  <text x="850" y="538" class="pill">Codex-ready plugin</text>
  <text x="820" y="596" class="label">PROCESS • API • DASHBOARD</text>
</svg>